<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CodeShop - Entretenimiento</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 (iconos modernos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Tipografías elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== MODO OSCURO POR DEFECTO ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            padding-top: 80px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* MODO CLARO */
        body.light-mode {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease-in-out, background 0.3s ease;
            transform: translateY(0);
        }

        body.light-mode .navbar {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .navbar.navbar-hidden {
            transform: translateY(-100%);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link-custom {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.light-mode .nav-link-custom {
            color: #333333;
        }

        .nav-link-custom:hover {
            color: #ff6b6b;
        }

        .search-container {
            position: relative;
            display: inline-block;
        }

        .search-input {
            padding: 8px 35px 8px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            width: 200px;
        }

        body.light-mode .search-input {
            background: white;
            border-color: #ddd;
            color: #333;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 2px rgba(255,107,107,0.2);
            width: 250px;
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1rem;
        }

        .theme-toggle {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 6px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            color: white;
        }

        body.light-mode .theme-toggle {
            background: #e0e0e0;
            border-color: #ccc;
            color: #333;
        }

        .cart-button {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 25px;
            padding: 6px 18px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .cart-button:hover {
            transform: scale(1.05);
        }

        .mundial-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000 !important;
            font-weight: bold;
            border-radius: 25px;
            padding: 8px 20px !important;
            transition: transform 0.3s ease;
        }

        .mundial-btn:hover {
            transform: scale(1.05);
        }

        /* Categories */
        .categories-section {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .category-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }

        /* Botones de subcategorías */
        .subcategories-section {
            margin: 20px 0 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .subcategories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .subcategory-btn {
            background: #1e1e1e;
            border: 2px solid #ff8e8e;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #ff8e8e;
        }

        body.light-mode .subcategory-btn {
            background: white;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .subcategory-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: scale(1.02);
            border-color: #ff6b6b;
        }

        .subcategory-btn small {
            font-size: 0.75rem;
            font-weight: normal;
            opacity: 0.8;
        }

        body.light-mode .subcategory-btn:hover small {
            color: white;
        }

        @media (max-width: 768px) {
            .categories-grid, .subcategories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding: 0 15px;
            }
            .category-btn, .subcategory-btn {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .categories-grid, .subcategories-grid {
                grid-template-columns: repeat(1, 1fr);
                max-width: 280px;
            }
        }

        /* Products */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .product-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        body.light-mode .product-card {
            background: #ffffff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #2a2a2a;
        }

        body.light-mode .product-image {
            background: #f0f0f0;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
        }

        body.light-mode .product-title {
            color: #1a1a1a;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ff8e8e;
            margin-bottom: 15px;
        }

        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .add-to-cart:hover {
            transform: scale(1.02);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .page-btn {
            padding: 10px 20px;
            background: #1e1e1e;
            border: 2px solid #ff8e8e;
            border-radius: 25px;
            color: #ff8e8e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.light-mode .page-btn {
            background: white;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .page-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: scale(1.05);
        }

        .page-info {
            font-size: 1rem;
            color: #aaaaaa;
        }

        body.light-mode .page-info {
            color: #666;
        }

        /* Slider */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slider-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0a0a;
            padding: 20px;
            box-sizing: border-box;
        }

        body.light-mode .slider-slide img {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }

        .slider-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
        }

        .slider-caption h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        .slider-caption p {
            color: #ddd;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.3s ease;
        }

        body.light-mode .slider-btn {
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .slider-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .slider-btn.prev { left: 20px; }
        .slider-btn.next { right: 20px; }

        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .slider-dot.active {
            background: #ff6b6b;
            width: 30px;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .hero-slider { height: 300px; }
            .slider-caption h3 { font-size: 1.2rem; }
            .slider-caption p { font-size: 0.8rem; }
            .slider-btn { width: 35px; height: 35px; font-size: 1rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            .nav-buttons { flex-wrap: wrap; justify-content: center; }
            .search-input { width: 100%; }
            .search-input:focus { width: 100%; }
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: #0a0a0a;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: white;
        }

        body.light-mode .cart-sidebar {
            background: white;
            color: #333;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        body.light-mode .cart-header {
            border-bottom-color: #ddd;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: inherit;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        body.light-mode .cart-item {
            border-bottom-color: #eee;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: #ff8e8e;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .quantity-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #ff6b6b;
            color: white;
            cursor: pointer;
        }

        .quantity-btn.minus {
            background: #555;
        }

        .cart-item-qty {
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 25px;
            text-align: center;
        }

        .cart-item-subtotal {
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 70px;
            text-align: right;
        }

        .remove-item {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1rem;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .clear-cart-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .cart-total {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 20px 0;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        body.light-mode .cart-total {
            border-top-color: #ddd;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #25D366;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            background: #050505;
            color: #ffffff;
            padding: 40px 5% 20px;
            margin-top: 60px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.light-mode .footer {
            background: #2c3e50;
            color: #ffffff;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 30px;
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ff8e8e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-info h4 {
            color: inherit;
            margin-bottom: 1rem;
        }

        .footer-info p {
            color: inherit;
        }

        .copyright {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85rem;
        }

        body.light-mode .copyright {
            border-top-color: rgba(255,255,255,0.2);
        }

        .copyright a {
            color: #ff8e8e;
            text-decoration: none;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .whatsapp-float a {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .whatsapp-float a:hover {
            transform: scale(1.05);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../../index.html" class="logo"><i class="fas fa-gem me-2"></i> CodeShop</a>
        <div class="nav-buttons">
            <a href="../../index.html" class="nav-link-custom"><i class="fas fa-home"></i> Inicio</a>
            <a href="../../mapa_.html" class="nav-link-custom"><i class="fas fa-map-marker-alt"></i> Ubicación</a>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos...">
                <button class="search-btn" onclick="filterProducts()"><i class="fas fa-search"></i></button>
            </div>
            <a href="../../../mundial/mundial.html" class="nav-link-custom mundial-btn"><i class="fas fa-futbol"></i> MUNDIAL 2026</a>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span>Modo Claro</span></button>
            <button class="cart-button" onclick="toggleCart()"><i class="fas fa-shopping-bag"></i> <span>Carrito</span> (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <!-- SLIDER DE PRODUCTOS DESTACADOS -->
    <div class="hero-slider">
        <div class="slider-container">
            <button class="slider-btn prev" onclick="prevSlide()">❮</button>
            <div class="slider-track" id="sliderTrack"></div>
            <button class="slider-btn next" onclick="nextSlide()">❯</button>
            <div class="slider-dots" id="sliderDots"></div>
        </div>
    </div>

    <!-- BOTONES DE CATEGORÍAS PRINCIPALES -->
    <div class="categories-section">
        <div class="categories-grid">
            <button class="category-btn" onclick="window.location.href='../../index.html'"><i class="fas fa-home"></i> Hogar</button>
            <button class="category-btn" onclick="window.location.href='#'"><i class="fas fa-makeup-brush"></i> Maquillaje</button>
            <button class="category-btn" onclick="window.location.href='#'"><i class="fas fa-tv"></i> Entretenimiento</button>
            <button class="category-btn" onclick="window.location.href='#'"><i class="fas fa-tshirt"></i> Indumentaria Blanquería</button>
            <button class="category-btn" onclick="window.location.href='#'"><i class="fas fa-mug-hot"></i> Termos y Mates</button>
            <button class="category-btn" onclick="window.location.href='#'"><i class="fas fa-lightbulb"></i> Iluminación</button>
        </div>
    </div>

    <!-- BOTONES DE SUBCATEGORÍAS DE ENTRETENIMIENTO -->
    <div class="subcategories-section">
        <div class="subcategories-grid">
            <button class="subcategory-btn" onclick="window.location.href='juegos_y_mas/juegos_y_mas.html'">
                <i class="fas fa-gamepad"></i> Juegos y más
                <small>47 Productos</small>
            </button>
            <button class="subcategory-btn" onclick="window.location.href='accesorios_infantiles/accesorios_infantiles.html'">
                <i class="fas fa-baby-carriage"></i> Accesorios infantiles
                <small>23 Productos</small>
            </button>
            <button class="subcategory-btn" onclick="window.location.href='tecnologia_y_diversion/tecnologia_y_diversion.html'">
                <i class="fas fa-microchip"></i> Tecnología y diversión
                <small>17 Productos</small>
            </button>
        </div>
    </div>

    <div class="container">
        <h1 id="category-title"><i class="fas fa-tv me-2"></i> Entretenimiento</h1>
        <div class="products-grid" id="products-grid"></div>
        
        <div class="pagination" id="pagination">

            { id: 13, name: "Producto 13", price: 17200, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-07-08-at-11.02.36-AM-1-400x400.webp" },
            { id: 14, name: "Producto 14", price: 12800, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-07-08-at-11.03.10-AM-2-400x400.webp" },
            { id: 15, name: "Producto 15", price: 19800, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-07-29-at-2.59.38-PM-400x400.webp" },
            { id: 16, name: "Producto 16", price: 22500, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-09-02-at-12.36.05-PM-400x400.webp" },
            { id: 17, name: "Producto 17", price: 7900, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-10-06-at-1.55.31-PM-400x400.webp" },
            { id: 18, name: "Producto 18", price: 9700, image: "../../assets/inicio/entretenimiento-1/WhatsApp-Image-2025-11-27-at-15.04.26-400x400.webp" }
        ];
        
        const allProducts = [...productsPage1];
        
        let currentPage = 1;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let lastScrollTopNav = 0;
        let currentSearchTerm = '';
        let currentSlide = 0;
        let autoSlideInterval;

        function renderSlider() {
            const sliderTrack = document.getElementById('sliderTrack');
            const sliderDots = document.getElementById('sliderDots');
            sliderTrack.innerHTML = '';
            sliderDots.innerHTML = '';
            
            featuredProducts.forEach((product, index) => {
                const slide = document.createElement('div');
                slide.className = 'slider-slide';
                slide.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/1200x500?text=Imagen+no+disponible'">
                    <div class="slider-caption">
                        <h3>${product.name}</h3>
                        <p>${product.description} | Desde $${product.price.toLocaleString()}</p>
                        <button class="add-to-cart" style="width: auto; padding: 10px 25px; margin-top: 10px;" onclick="addToCart(${index + 1000}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Comprar ahora
                        </button>
                    </div>
                `;
                sliderTrack.appendChild(slide);
                
                const dot = document.createElement('div');
                dot.className = 'slider-dot';
                dot.onclick = () => goToSlide(index);
                sliderDots.appendChild(dot);
            });
            
            updateSlider();
        }
        
        function updateSlider() {
            const sliderTrack = document.getElementById('sliderTrack');
            sliderTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            const dots = document.querySelectorAll('.slider-dot');
            dots.forEach((dot, index) => {
                if (index === currentSlide) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        function nextSlide() {
            currentSlide = (currentSlide + 1) % featuredProducts.length;
            updateSlider();
            resetAutoSlide();
        }
        
        function prevSlide() {
            currentSlide = (currentSlide - 1 + featuredProducts.length) % featuredProducts.length;
            updateSlider();
            resetAutoSlide();
        }
        
        function goToSlide(index) {
            currentSlide = index;
            updateSlider();
            resetAutoSlide();
        }
        
        function startAutoSlide() {
            autoSlideInterval = setInterval(() => {
                nextSlide();
            }, 2500);
        }
        
        function resetAutoSlide() {
            clearInterval(autoSlideInterval);
            startAutoSlide();
        }
        
        function renderProducts() {
            if (currentSearchTerm !== '') {
                filterProducts();
                return;
            }
            
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            productsPage1.forEach((product) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=Imagen+no+disponible'">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">$${product.price.toLocaleString()}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Agregar al carrito
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            document.getElementById('page-info').textContent = `Página 1 de 1`;
            document.getElementById('category-title').innerHTML = `<i class="fas fa-tv me-2"></i> Entretenimiento (18 productos)`;
            document.getElementById('pagination').style.display = 'flex';
        }
        
        function nextPage() {
            if (currentSearchTerm !== '') return;
            // No hay más páginas por ahora
        }
        
        function prevPage() {
            if (currentSearchTerm !== '') return;
            // No hay página anterior
        }
        
        function filterProducts() {
            const searchInput = document.getElementById('searchInput');
            currentSearchTerm = searchInput.value.toLowerCase().trim();
            
            if (currentSearchTerm === '') {
                renderProducts();
                document.getElementById('pagination').style.display = 'flex';
                return;
            }
            
            const filteredProducts = allProducts.filter(product => 
                product.name.toLowerCase().includes(currentSearchTerm)
            );
            
            document.getElementById('pagination').style.display = 'none';
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No se encontraron productos</h3>
                        <p>No hay resultados para "${searchInput.value}"</p>
                    </div>
                `;
                document.getElementById('category-title').innerHTML = `<i class="fas fa-tv me-2"></i> Resultados: "${searchInput.value}"`;
                return;
            }
            
            document.getElementById('category-title').innerHTML = `<i class="fas fa-tv me-2"></i> Resultados (${filteredProducts.length}) para: "${searchInput.value}"`;
            
            filteredProducts.forEach((product) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=Imagen+no+disponible'">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">$${product.price.toLocaleString()}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Agregar al carrito
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function addToCart(id, name, price, image) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, image, quantity: 1 });
            }
            saveCart();
            updateCartUI();
            showNotification(`${name} agregado al carrito`);
        }
        
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = totalItems;
            
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotalElement = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i><br>Tu carrito está vacío</div>';
                cartTotalElement.textContent = 'Total: $0';
                return;
            }
            
            let cartHTML = `<button class="clear-cart-btn" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Vaciar carrito</button>`;
            
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                cartHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image" onerror="this.src='https://via.placeholder.com/60x60?text=No+image'">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price.toLocaleString()}</div>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn minus" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span class="cart-item-qty">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div class="cart-item-subtotal">$${subtotal.toLocaleString()}</div>
                        <button class="remove-item" onclick="removeItem(${item.id})" title="Eliminar">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                `;
            });
            
            cartItemsContainer.innerHTML = cartHTML;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalElement.textContent = `Total: $${total.toLocaleString()}`;
        }
        
        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                const newQuantity = item.quantity + change;
                if (newQuantity <= 0) {
                    removeItem(id);
                } else {
                    item.quantity = newQuantity;
                    saveCart();
                    updateCartUI();
                }
            }
        }
        
        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
            showNotification('Producto eliminado del carrito');
        }
        
        function clearCart() {
            if (cart.length > 0 && confirm('¿Estás seguro de vaciar el carrito?')) {
                cart = [];
                saveCart();
                updateCartUI();
                showNotification('Carrito vaciado');
            }
        }
        
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `position:fixed; bottom:20px; right:20px; background:#27ae60; color:white; padding:12px 24px; border-radius:8px; z-index:10000; animation:fadeInOut 2s ease;`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
        
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }
        
        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                icon.className = 'fas fa-moon';
                span.textContent = 'Modo Claro';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                icon.className = 'fas fa-sun';
                span.textContent = 'Modo Oscuro';
                localStorage.setItem('theme', 'light');
            }
        }
        
        function processWhatsAppOrder() {
            if (cart.length === 0) {
                alert('El carrito está vacío');
                return;
            }
            
            let message = '🛍️ *NUEVO PEDIDO - CodeShop* 🛍️\n\n';
            message += '*DETALLE DE LA COMPRA:*\n';
            message += '─'.repeat(30) + '\n\n';
            
            cart.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                message += `*${index + 1}. ${item.name}*\n`;
                message += `   📦 Cantidad: ${item.quantity}\n`;
                message += `   💰 Precio unitario: $${item.price.toLocaleString()}\n`;
                message += `   💵 Subtotal: $${subtotal.toLocaleString()}\n\n`;
            });
            
            message += '─'.repeat(30) + '\n';
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `*💰 TOTAL DEL PEDIDO: $${total.toLocaleString()}*\n\n`;
            message += '─'.repeat(30) + '\n\n';
            message += '*📞 En un momento serás atendido por un asesor...*\n';
            message += '¡Gracias por tu compra! 🙌';
            
            window.open(`https://wa.me/543541682310?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function handleScroll() {
            const navbar = document.querySelector('.navbar');
            const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (currentScrollTop > lastScrollTopNav && currentScrollTop > 50) {
                navbar.classList.add('navbar-hidden');
            } else if (currentScrollTop < lastScrollTopNav) {
                navbar.classList.remove('navbar-hidden');
            }
            
            if (currentScrollTop <= 10) {
                navbar.classList.remove('navbar-hidden');
            }
            
            lastScrollTopNav = currentScrollTop;
        }
        
        // Inicializar tema (oscuro por defecto)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            if (icon) {
                icon.className = 'fas fa-sun';
                span.textContent = 'Modo Oscuro';
            }
        } else {
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            if (icon) {
                icon.className = 'fas fa-moon';
                span.textContent = 'Modo Claro';
            }
        }
        
        const sliderContainer = document.querySelector('.hero-slider');
        sliderContainer.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
        sliderContainer.addEventListener('mouseleave', startAutoSlide);
        
        renderSlider();
        startAutoSlide();
        renderProducts();
        updateCartUI();
        window.addEventListener('scroll', handleScroll);
        document.getElementById('searchInput').addEventListener('keyup', function() { filterProducts(); });
    </script>
