    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== MODO OSCURO POR DEFECTO ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            padding-top: 80px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* MODO CLARO */
        body.light-mode {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }
        
        /* Navbar - oscuro por defecto */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease-in-out, background 0.3s ease;
            transform: translateY(0);
        }
        
        body.light-mode .navbar {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        
        .navbar.navbar-hidden {
            transform: translateY(-100%);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-link-custom {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        body.light-mode .nav-link-custom {
            color: #333333;
        }
        
        .nav-link-custom:hover {
            color: #ff6b6b;
        }
        
        .search-container {
            position: relative;
            display: inline-block;
        }
        
        .search-input {
            padding: 8px 35px 8px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            width: 200px;
        }
        
        body.light-mode .search-input {
            background: white;
            border-color: #ddd;
            color: #333;
        }
        
        .search-input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 2px rgba(255,107,107,0.2);
            width: 250px;
        }
        
        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .theme-toggle {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 6px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            color: white;
        }
        
        body.light-mode .theme-toggle {
            background: #e0e0e0;
            border-color: #ccc;
            color: #333;
        }
        
        .cart-button {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 25px;
            padding: 6px 18px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .cart-button:hover {
            transform: scale(1.05);
        }
        
        .mundial-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000 !important;
            font-weight: bold;
            border-radius: 25px;
            padding: 8px 20px !important;
            transition: transform 0.3s ease;
        }
        
        .mundial-btn:hover {
            transform: scale(1.05);
        }
        
        /* Categories */
        .categories-section {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .category-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }
        
        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding: 0 15px;
            }
            .category-btn {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .categories-grid {
                grid-template-columns: repeat(1, 1fr);
                max-width: 280px;
            }
        }
        
        /* Products */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .product-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        body.light-mode .product-card {
            background: #ffffff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #2a2a2a;
        }
        
        body.light-mode .product-image {
            background: #f0f0f0;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        body.light-mode .product-title {
            color: #1a1a1a;
        }
        
        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ff8e8e;
            margin-bottom: 15px;
        }
        
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .add-to-cart:hover {
            transform: scale(1.02);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        
        .page-btn {
            padding: 10px 20px;
            background: #1e1e1e;
            border: 2px solid #ff8e8e;
            border-radius: 25px;
            color: #ff8e8e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        body.light-mode .page-btn {
            background: white;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .page-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: scale(1.05);
        }
        
        .page-info {
            font-size: 1rem;
            color: #aaaaaa;
        }
        
        body.light-mode .page-info {
            color: #666;
        }
        
        /* Slider */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        
        .slider-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }
        
        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0a0a;
            padding: 20px;
            box-sizing: border-box;
        }
        
        body.light-mode .slider-slide img {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }
        
        .slider-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
        }
        
        .slider-caption h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }
        
        .slider-caption p {
            color: #ddd;
        }
        
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.3s ease;
        }
        
        body.light-mode .slider-btn {
            background: rgba(0,0,0,0.5);
            color: white;
        }
        
        .slider-btn:hover {
            background: #ff6b6b;
            color: white;
        }
        
        .slider-btn.prev { left: 20px; }
        .slider-btn.next { right: 20px; }
        
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        
        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        
        .slider-dot.active {
            background: #ff6b6b;
            width: 30px;
            border-radius: 6px;
        }
        
        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .hero-slider { height: 300px; }
            .slider-caption h3 { font-size: 1.2rem; }
            .slider-btn { width: 35px; height: 35px; font-size: 1rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        }
        
        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: #0a0a0a;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: white;
        }
        
        body.light-mode .cart-sidebar {
            background: white;
            color: #333;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
        }
        
        .cart-sidebar.active {
            right: 0;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        
        body.light-mode .cart-header {
            border-bottom-color: #ddd;
        }
        
        .close-cart {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: inherit;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        
        body.light-mode .cart-item {
            border-bottom-color: #eee;
        }
        
        .cart-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .cart-item-price {
            font-size: 0.85rem;
            color: #ff8e8e;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        
        .quantity-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #ff6b6b;
            color: white;
            cursor: pointer;
        }
        
        .quantity-btn.minus {
            background: #555;
        }
        
        .cart-item-qty {
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 25px;
            text-align: center;
        }
        
        .cart-item-subtotal {
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 70px;
            text-align: right;
        }
        
        .remove-item {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .clear-cart-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .cart-total {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 20px 0;
            padding-top: 10px;
            border-top: 1px solid #333;
        }
        
        body.light-mode .cart-total {
            border-top-color: #ddd;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #25D366;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            grid-column: 1 / -1;
        }
        
        /* Footer - oscuro por defecto */
        .footer {
            background: #050505;
            color: #ffffff;
            padding: 40px 5% 20px;
            margin-top: 60px;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        body.light-mode .footer {
            background: #e9ecef;
            color: #1a1a1a;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .footer-logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ff8e8e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .footer-info h4 {
            color: inherit;
        }
        
        .footer-info p {
            color: inherit;
        }
        
        .copyright {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85rem;
        }
        
        body.light-mode .copyright {
            border-top-color: rgba(0,0,0,0.1);
        }
        
        .copyright a {
            color: #ff8e8e;
            text-decoration: none;
        }
        
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        
        .whatsapp-float a {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>

            { name: "Smart TV", price: 145000, image: "../assets/slider/IMG-20260312-WA0185-400x400.webp", description: "Entretenimiento sin límites" },
            { name: "TV ORYX 32 Pulgadas", price: 115000, image: "../assets/slider/Televisor-inteligente-ORYX-32-pulgadas-400x400.webp", description: "Perfecto para cualquier espacio" },
            { name: "Televisor Premium", price: 165000, image: "../assets/slider/WhatsApp-Image-2025-01-02-at-6.15.06-PM-scaled-e1755542882322-400x400.webp", description: "Calidad de imagen excepcional" },
            { name: "TV Moderna", price: 135000, image: "../assets/slider/WhatsApp-Image-2025-02-26-at-14.26.59-2-400x400.webp", description: "Diseño elegante y funcional" },
            { name: "Smart TV 4K", price: 195000, image: "../assets/slider/WhatsApp-Image-2025-05-08-at-1.46.17-PM-400x400.webp", description: "Resolución 4K para máxima nitidez" },
            { name: "Televisor ORYX", price: 105000, image: "../assets/slider/WhatsApp-Image-2026-02-13-at-1.48.43-PM-1-400x400.webp", description: "Excelente relación calidad-precio" },
            { name: "TV LED", price: 155000, image: "../assets/slider/WhatsApp-Image-2026-02-19-at-1.12.07-PM-400x400.jpeg", description: "Colores vivos y brillantes" },
            { name: "Televisor Económico", price: 95000, image: "../assets/slider/WhatsApp-Image-2026-03-16-at-4.40.46-PM-400x400.webp", description: "Calidad a buen precio" },
            { name: "Smart TV ORYX", price: 175000, image: "../assets/slider/WhatsApp-Image-2026-03-16-at-5.38.39-PM-1-400x400.webp", description: "Lo último en tecnología" },
            { name: "TV 89dfc65b", price: 125000, image: "../assets/slider/89dfc65b-e10e-4c6c-8514-dd92b58dabdf-768x768.webp", description: "Diseño único y exclusivo" },
            { name: "Televisor ORYX 42", price: 168000, image: "../assets/slider/Caja-de-TV-inteligente-ORYX-42_-400x400.webp", description: "El equilibrio perfecto" },
            { name: "TV WhatsApp", price: 142000, image: "../assets/slider/WhatsApp-Image-2026-03-16-at-5.51.03-PM-1-400x400.webp", description: "Conectividad total" }
        ];

        // Productos
        const productsPage1 = [
            { id: 1, name: "Producto 1", price: 8500, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.30-AM-400x400.webp" },
            { id: 2, name: "Producto 2", price: 9200, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.32-AM-2-400x400.webp" },
            { id: 3, name: "Producto 3", price: 7800, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.33-AM-1-400x400.webp" },
            { id: 4, name: "Producto 4", price: 10500, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.35-AM-1-400x400.webp" },
            { id: 5, name: "Producto 5", price: 6900, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.58-AM-2-400x400.webp" },
            { id: 6, name: "Producto 6", price: 8800, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.20.58-AM-400x400.webp" },
            { id: 7, name: "Producto 7", price: 9500, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.21.00-AM-400x400.webp" },
            { id: 8, name: "Producto 8", price: 10200, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.21.02-AM-2-400x400.webp" },
            { id: 9, name: "Producto 9", price: 8200, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.21.03-AM-2-400x400.webp" },
            { id: 10, name: "Producto 10", price: 11500, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.21.05-AM-3-400x400.webp" },
            { id: 11, name: "Producto 11", price: 7600, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.21.06-AM-3-400x400.webp" },
            { id: 12, name: "Producto 12", price: 8900, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.39.00-AM-2-400x400.webp" },
            { id: 13, name: "Producto 13", price: 12800, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-11.42.01-AM-1-400x400.webp" },
            { id: 14, name: "Producto 14", price: 9800, image: "../assets/inicio/1/WhatsApp-Image-2026-03-18-at-12.07.22-PM-400x400.webp" },
            { id: 15, name: "Producto 15", price: 11200, image: "../assets/inicio/1/WhatsApp-Image-2026-03-20-at-1.31.28-PM-2-e1774283479405-400x400.webp" },
            { id: 16, name: "Producto 16", price: 8400, image: "../assets/inicio/1/WhatsApp-Image-2026-03-21-at-12.47.29-PM-1-400x400.webp" }
        ];
        
        const productsPage2 = [];
        const allProducts = [...productsPage1, ...productsPage2];
        
        let currentPage = 1;
        let totalPages = 68;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let lastScrollTopNav = 0;
        let currentSearchTerm = '';
        let currentSlide = 0;
        let autoSlideInterval;

        function renderSlider() {
            const sliderTrack = document.getElementById('sliderTrack');
            const sliderDots = document.getElementById('sliderDots');
            sliderTrack.innerHTML = '';
            sliderDots.innerHTML = '';
            
            featuredProducts.forEach((product, index) => {
                const slide = document.createElement('div');
                slide.className = 'slider-slide';
                slide.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/1200x500?text=Imagen+no+disponible'">
                    <div class="slider-caption">
                        <h3>${product.name}</h3>
                        <p>${product.description} | Desde $${product.price.toLocaleString()}</p>
                        <button class="add-to-cart" style="width: auto; padding: 10px 25px; margin-top: 10px;" onclick="addToCart(${index + 1000}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Comprar ahora
                        </button>
                    </div>
                `;
                sliderTrack.appendChild(slide);
                const dot = document.createElement('div');
                dot.className = 'slider-dot';
                dot.onclick = () => goToSlide(index);
                sliderDots.appendChild(dot);
            });
            updateSlider();
        }
        
        function updateSlider() {
            const sliderTrack = document.getElementById('sliderTrack');
            sliderTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
            const dots = document.querySelectorAll('.slider-dot');
            dots.forEach((dot, index) => {
                if (index === currentSlide) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }
        
        function nextSlide() { currentSlide = (currentSlide + 1) % featuredProducts.length; updateSlider(); resetAutoSlide(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + featuredProducts.length) % featuredProducts.length; updateSlider(); resetAutoSlide(); }
        function goToSlide(index) { currentSlide = index; updateSlider(); resetAutoSlide(); }
        function startAutoSlide() { autoSlideInterval = setInterval(() => { nextSlide(); }, 2000); }
        function resetAutoSlide() { clearInterval(autoSlideInterval); startAutoSlide(); }
        
        function renderProducts() {
            if (currentSearchTerm !== '') { filterProducts(); return; }
            const products = currentPage === 1 ? productsPage1 : productsPage2;
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            if (products.length === 0) {
                grid.innerHTML = '<div class="no-results"><i class="fas fa-box-open"></i><h3>Próximamente</h3><p>Más productos en camino</p></div>';
                document.getElementById('pagination').style.display = 'none';
                document.getElementById('category-title').innerHTML = `<i class="fas fa-star-of-life me-2"></i> Productos - Página ${currentPage}`;
                return;
            }
            products.forEach((product) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=Imagen+no+disponible'">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">$${product.price.toLocaleString()}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Agregar al carrito
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('page-info').textContent = `Página ${currentPage} de ${totalPages}`;
            document.getElementById('category-title').innerHTML = `<i class="fas fa-star-of-life me-2"></i> Productos - Página ${currentPage}`;
            document.getElementById('pagination').style.display = 'flex';
        }
        
        function nextPage() { 
            if (currentSearchTerm !== '') return; 
            if (currentPage < totalPages) { 
                currentPage = 2;
                window.location.href = `inicio/2/2.html`;
            } 
        }
        
        function prevPage() { 
            if (currentSearchTerm !== '') return; 
        }
        
        function filterProducts() {
            const searchInput = document.getElementById('searchInput');
            currentSearchTerm = searchInput.value.toLowerCase().trim();
            if (currentSearchTerm === '') { renderProducts(); document.getElementById('pagination').style.display = 'flex'; return; }
            const filteredProducts = allProducts.filter(p => p.name.toLowerCase().includes(currentSearchTerm));
            document.getElementById('pagination').style.display = 'none';
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            if (filteredProducts.length === 0) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h3>No se encontraron productos</h3><p>No hay resultados para "${searchInput.value}"</p></div>`;
                document.getElementById('category-title').innerHTML = `<i class="fas fa-star-of-life me-2"></i> Resultados: "${searchInput.value}"`;
                return;
            }
            document.getElementById('category-title').innerHTML = `<i class="fas fa-star-of-life me-2"></i> Resultados (${filteredProducts.length}) para: "${searchInput.value}"`;
            filteredProducts.forEach((product) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=Imagen+no+disponible'">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">$${product.price.toLocaleString()}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-shopping-cart"></i> Agregar al carrito
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function addToCart(id, name, price, image) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) existingItem.quantity += 1;
            else cart.push({ id, name, price, image, quantity: 1 });
            saveCart(); updateCartUI(); showNotification(`${name} agregado al carrito`);
        }
        
        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }
        
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = totalItems;
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotalElement = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart" style="font-size: 3rem; opacity: 0.5;"></i><br>Tu carrito está vacío</div>';
                cartTotalElement.textContent = 'Total: $0';
                return;
            }
            let cartHTML = `<button class="clear-cart-btn" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Vaciar carrito</button>`;
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                cartHTML += `<div class="cart-item"><img src="${item.image}" class="cart-item-image"><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">$${item.price.toLocaleString()}</div><div class="cart-item-quantity"><button class="quantity-btn minus" onclick="updateQuantity(${item.id}, -1)">-</button><span class="cart-item-qty">${item.quantity}</span><button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button></div></div><div class="cart-item-subtotal">$${subtotal.toLocaleString()}</div><button class="remove-item" onclick="removeItem(${item.id})"><i class="fas fa-times-circle"></i></button></div>`;
            });
            cartItemsContainer.innerHTML = cartHTML;
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalElement.textContent = `Total: $${total.toLocaleString()}`;
        }
        
        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) { const newQ = item.quantity + change; if (newQ <= 0) removeItem(id); else { item.quantity = newQ; saveCart(); updateCartUI(); } }
        }
        
        function removeItem(id) { cart = cart.filter(item => item.id !== id); saveCart(); updateCartUI(); showNotification('Producto eliminado'); }
        function clearCart() { if (confirm('¿Vaciar carrito?')) { cart = []; saveCart(); updateCartUI(); showNotification('Carrito vaciado'); } }
        function showNotification(msg) { const n = document.createElement('div'); n.textContent = msg; n.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#27ae60; color:white; padding:12px 24px; border-radius:8px; z-index:10000; animation:fadeInOut 2s ease;'; document.body.appendChild(n); setTimeout(() => n.remove(), 2000); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        
        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                icon.className = 'fas fa-moon';
                span.textContent = 'Modo Claro';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                icon.className = 'fas fa-sun';
                span.textContent = 'Modo Oscuro';
                localStorage.setItem('theme', 'light');
            }
        }
        
        function processWhatsAppOrder() {
            if (cart.length === 0) { alert('Carrito vacío'); return; }
            let message = '🛍️ *NUEVO PEDIDO - CodeShop* 🛍️\n\n*DETALLE:*\n';
            cart.forEach((item, i) => { message += `${i+1}. ${item.name} x${item.quantity} - $${(item.price * item.quantity).toLocaleString()}\n`; });
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*TOTAL: $${total.toLocaleString()}*`;
            window.open(`https://wa.me/543541682310?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function handleScroll() {
            const navbar = document.querySelector('.navbar');
            const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (currentScrollTop > lastScrollTopNav && currentScrollTop > 50) navbar.classList.add('navbar-hidden');
            else if (currentScrollTop < lastScrollTopNav) navbar.classList.remove('navbar-hidden');
            if (currentScrollTop <= 10) navbar.classList.remove('navbar-hidden');
            lastScrollTopNav = currentScrollTop;
        }
        
        // Inicializar tema (oscuro por defecto)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            if (icon) {
                icon.className = 'fas fa-sun';
                span.textContent = 'Modo Oscuro';
            }
        } else {
            // Por defecto oscuro
            const icon = document.querySelector('.theme-toggle i');
            const span = document.querySelector('.theme-toggle span');
            if (icon) {
                icon.className = 'fas fa-moon';
                span.textContent = 'Modo Claro';
            }
        }
        
        const sliderContainer = document.querySelector('.hero-slider');
        sliderContainer.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
        sliderContainer.addEventListener('mouseleave', startAutoSlide);
        
        renderSlider();
        startAutoSlide();
        renderProducts();
        updateCartUI();
        window.addEventListener('scroll', handleScroll);
        document.getElementById('searchInput').addEventListener('keyup', function() { filterProducts(); });
    </script>
    <style>
        .cart-item-image { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #333; }
        body.light-mode .cart-item { border-bottom-color: #eee; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 0.9rem; font-weight: 600; }
        .cart-item-price { font-size: 0.85rem; color: #ff8e8e; }
        .cart-item-quantity { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .quantity-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: #ff6b6b; color: white; cursor: pointer; }
        .quantity-btn.minus { background: #555; }
        .cart-item-qty { font-size: 0.9rem; font-weight: 600; min-width: 25px; text-align: center; }
        .cart-item-subtotal { font-size: 0.85rem; font-weight: 700; min-width: 70px; text-align: right; }
        .remove-item { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 1rem; }
        .cart-empty { text-align: center; padding: 40px 20px; color: #888; }
        .clear-cart-btn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; }
        .no-results { text-align: center; padding: 60px 20px; color: #888; grid-column: 1 / -1; }
    </style>
